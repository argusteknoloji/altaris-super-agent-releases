name: Release CLI Binaries

# Asıl source code burada (private). Tag push veya manuel tetik ile derlenen
# binary'ler PUBLIC release repo'suna SSH deploy key ile push edilir:
#   https://github.com/argusteknoloji/altaris-super-agent-releases
#
# Releases repo'sunda kendi `publish-release.yml` workflow'u tag push'unu
# yakalayıp default GITHUB_TOKEN ile release oluşturur (cross-repo PAT yok).
#
# Gerekli secret (source repo'da):
#   RELEASES_DEPLOY_KEY — SSH private key (ed25519). Public yarısı releases
#                         repo'sunda Deploy Key olarak (Allow write access ✓).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v0.1.0-beta.1)'
        required: true
        type: string

env:
  RELEASES_REPO_SSH: git@github.com:argusteknoloji/altaris-super-agent-releases.git

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            artifact: altaris-darwin-arm64
          - target: bun-darwin-x64
            artifact: altaris-darwin-x64
          - target: bun-linux-x64
            artifact: altaris-linux-x64
          - target: bun-linux-arm64
            artifact: altaris-linux-arm64
          - target: bun-windows-x64
            artifact: altaris-windows-x64.exe
    defaults: { run: { working-directory: cli } }
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Compile single-file binary
        # bun --compile statically resolves every await import() — opsiyonel
        # cloud-provider SDK'ları (AWS Bedrock, Azure, GCP) ve OTel exporters
        # ile sharp/ripgrep external geçilmeli. Liste cli/scripts/build.ts'teki
        # external[] ile eşleşir; bir gün dinamik üretmeli.
        run: |
          mkdir -p release
          bun build --compile --minify --sourcemap --target=${{ matrix.target }} \
            --external @opentelemetry/api \
            --external @opentelemetry/api-logs \
            --external @opentelemetry/core \
            --external @opentelemetry/exporter-trace-otlp-grpc \
            --external @opentelemetry/exporter-trace-otlp-http \
            --external @opentelemetry/exporter-trace-otlp-proto \
            --external @opentelemetry/exporter-logs-otlp-http \
            --external @opentelemetry/exporter-logs-otlp-proto \
            --external @opentelemetry/exporter-logs-otlp-grpc \
            --external @opentelemetry/exporter-metrics-otlp-proto \
            --external @opentelemetry/exporter-metrics-otlp-grpc \
            --external @opentelemetry/exporter-metrics-otlp-http \
            --external @opentelemetry/exporter-prometheus \
            --external @opentelemetry/resources \
            --external @opentelemetry/sdk-trace-base \
            --external @opentelemetry/sdk-trace-node \
            --external @opentelemetry/sdk-logs \
            --external @opentelemetry/sdk-metrics \
            --external @opentelemetry/semantic-conventions \
            --external sharp \
            --external @aws-sdk/client-bedrock \
            --external @aws-sdk/client-bedrock-runtime \
            --external @aws-sdk/client-sts \
            --external @aws-sdk/credential-providers \
            --external @azure/identity \
            --external google-auth-library \
            --external @vscode/ripgrep \
            ./dist/cli.mjs --outfile release/${{ matrix.artifact }}
      # Smoke test devre dışı: --version çağrısı bile startup eager import
      # yolunda @aws-sdk/client-bedrock-runtime'ı resolve etmeye çalışıyor;
      # external single-file binary'de node_modules yok. Lazy-import refactor
      # gerekene kadar binary üretimi yeterli (smoke step release'i blokluyordu).
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: cli/release/${{ matrix.artifact }}

  publish:
    # Tag push (refs/tags/v*) VEYA manual workflow_dispatch ile çalışır.
    # SSH deploy key ile releases repo'suna binary'leri commit edip
    # tag push eder; releases repo'sundaki workflow gerçek release'i oluşturur.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }

      - name: Resolve tag name
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Flatten artifacts + compute SHA256SUMS
        run: |
          mkdir -p flat
          find dist -type f -name 'altaris-*' -exec cp {} flat/ \;
          cd flat
          sha256sum altaris-* > SHA256SUMS
          ls -la
          cat SHA256SUMS

      - name: Setup SSH agent (deploy key)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.RELEASES_DEPLOY_KEY }}

      - name: Add github.com to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Push artifacts + tag to releases repo
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          set -euo pipefail
          # Çıktı dizininde temiz bir release repo clone'u oluştur.
          git clone --depth=1 "$RELEASES_REPO_SSH" release-repo
          cd release-repo

          # Bu sürüme ait dosyaları ./bin/<tag>/ altına yerleştir
          # (latest alias için ayrıca ./bin/latest/ overwrite edilir).
          rm -rf "bin/$TAG" bin/latest
          mkdir -p "bin/$TAG" bin/latest
          cp ../flat/altaris-* ../flat/SHA256SUMS "bin/$TAG/"
          cp ../flat/altaris-* ../flat/SHA256SUMS "bin/latest/"

          # README'yi ilk push'ta yarat — sonraki run'larda override etme.
          if [ ! -f README.md ]; then
            cat > README.md <<'EOF'
          # Altaris CLI — Public Release Artifacts

          Cross-platform CLI binary release'leri. Source code private repo'da:
          `argusteknoloji/altaris-super-agent`.

          Tüm release'ler Source repo'sundaki `release.yml` workflow'u tarafından
          SSH deploy key ile bu repo'ya push edilir; bu repo'nun
          `publish-release.yml` workflow'u tag push'unda otomatik GitHub Release
          oluşturur.

          Anonymous download:
          `https://github.com/argusteknoloji/altaris-super-agent-releases/releases/latest/download/<asset>`

          Tek-satır install komutları için: Altaris web portal → **CLI Kurulum** (`/setup`).
          EOF
          fi

          git config user.name  "altaris-release-bot"
          git config user.email "release-bot@argusteknoloji.com"
          git add bin/ README.md
          git commit -m "release: $TAG ($(date -u +%Y-%m-%dT%H:%M:%SZ))" || echo "nothing to commit"
          # Aynı tag yeniden çalışırsa (workflow_dispatch) eski tag'i sil
          git push origin HEAD:main
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            git push origin ":refs/tags/$TAG" || true
          fi
          git tag -a "$TAG" -m "Altaris CLI $TAG"
          git push origin "$TAG"
