name: Release CLI Binaries

# Asıl source code burada (private). Tag push veya manuel tetik ile derlenen
# binary'ler PUBLIC release repo'sunda asset olarak yayımlanır:
#   https://github.com/argusteknoloji/altaris-super-agent-releases
#
# Neden API + token (SSH değil): bun --compile çıktıları 80-130 MB; GitHub'ın
# git push limiti 100 MB / dosya iken Releases asset upload limiti 2 GB.
# Binary'leri git'e koymak yanlış pattern; doğrudan Release sayfasına atılır.
#
# Gerekli secret (source repo'da):
#   RELEASES_REPO_TOKEN — fine-grained PAT
#     · Repository access: argusteknoloji/altaris-super-agent-releases (sadece o)
#     · Permissions:        Contents = Read & Write
#     · Süre:               1 yıl (rotate edersin)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v0.1.0-beta.2)'
        required: true
        type: string

env:
  RELEASES_REPO: argusteknoloji/altaris-super-agent-releases
  # vscode/ripgrep postinstall GitHub'dan binary indiriyor; anon trafik 403
  # yiyor. Authenticated default GITHUB_TOKEN ile rate limit 5000/saat.
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            artifact: altaris-darwin-arm64
          - target: bun-darwin-x64
            artifact: altaris-darwin-x64
          - target: bun-linux-x64
            artifact: altaris-linux-x64
          - target: bun-linux-arm64
            artifact: altaris-linux-arm64
          - target: bun-windows-x64
            artifact: altaris-windows-x64.exe
    defaults: { run: { working-directory: cli } }
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: Install deps (with retry — postinstall scripts hit GitHub)
        run: |
          for i in 1 2 3; do
            bun install --frozen-lockfile && break || sleep 10
          done

      - name: Bundle main artifact (dist/cli.mjs)
        run: bun run build

      - name: Compile single-file binary
        # bun --compile statically resolves every await import() — opsiyonel
        # cloud-provider SDK'ları (AWS Bedrock, Azure, GCP) ve OTel exporters
        # ile sharp/ripgrep external geçilmeli. Liste cli/scripts/build.ts'teki
        # external[] ile eşleşir; bir gün dinamik üretmeli.
        #
        # GÜVENLIK: --sourcemap KULLANILMIYOR. Public release repo'sunda yalnız
        # minified binary olsun; sourcemap orijinal source path'lerini ve bazı
        # durumlarda gömülü kaynağı sızdırabilir. Source private kalır.
        run: |
          mkdir -p release
          bun build --compile --minify --target=${{ matrix.target }} \
            --external @opentelemetry/api \
            --external @opentelemetry/api-logs \
            --external @opentelemetry/core \
            --external @opentelemetry/exporter-trace-otlp-grpc \
            --external @opentelemetry/exporter-trace-otlp-http \
            --external @opentelemetry/exporter-trace-otlp-proto \
            --external @opentelemetry/exporter-logs-otlp-http \
            --external @opentelemetry/exporter-logs-otlp-proto \
            --external @opentelemetry/exporter-logs-otlp-grpc \
            --external @opentelemetry/exporter-metrics-otlp-proto \
            --external @opentelemetry/exporter-metrics-otlp-grpc \
            --external @opentelemetry/exporter-metrics-otlp-http \
            --external @opentelemetry/exporter-prometheus \
            --external @opentelemetry/resources \
            --external @opentelemetry/sdk-trace-base \
            --external @opentelemetry/sdk-trace-node \
            --external @opentelemetry/sdk-logs \
            --external @opentelemetry/sdk-metrics \
            --external @opentelemetry/semantic-conventions \
            --external sharp \
            --external @aws-sdk/client-bedrock \
            --external @aws-sdk/client-bedrock-runtime \
            --external @aws-sdk/client-sts \
            --external @aws-sdk/credential-providers \
            --external @azure/identity \
            --external google-auth-library \
            --external @vscode/ripgrep \
            ./dist/cli.mjs --outfile release/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: cli/release/${{ matrix.artifact }}

  publish:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }

      - name: Resolve tag name
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Flatten artifacts + compute SHA256SUMS
        # Sıkı whitelist: yalnız beş bilinen artifact ismi. Sourcemap/.txt/
        # log/profile gibi yan dosyalar ASLA copy edilmesin — public release
        # asset olarak yalnız compiled binary çıksın.
        run: |
          mkdir -p flat
          for name in altaris-darwin-arm64 altaris-darwin-x64 \
                      altaris-linux-x64 altaris-linux-arm64 \
                      altaris-windows-x64.exe; do
            src=$(find dist -type f -name "$name" | head -1)
            if [ -z "$src" ]; then echo "MISSING $name" >&2; exit 1; fi
            cp "$src" "flat/$name"
          done
          unexpected=$(find flat -type f -not -name 'altaris-*' | head)
          if [ -n "$unexpected" ]; then
            echo "REJECT: unexpected file(s) in artifact set: $unexpected" >&2
            exit 1
          fi
          cd flat
          sha256sum altaris-* > SHA256SUMS
          ls -la
          cat SHA256SUMS

      - name: Publish to public release repo
        # Doğrudan Releases API ile asset upload — git push limiti (100 MB)
        # bypass. PAT scope: yalnız `argusteknoloji/altaris-super-agent-
        # releases` üzerinde Contents: Read & Write.
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ steps.tag.outputs.name }}
          name: Altaris CLI ${{ steps.tag.outputs.name }}
          files: |
            flat/altaris-darwin-arm64
            flat/altaris-darwin-x64
            flat/altaris-linux-x64
            flat/altaris-linux-arm64
            flat/altaris-windows-x64.exe
            flat/SHA256SUMS
          body: |
            Altaris CLI binary release.
            Source: private `argusteknoloji/altaris-super-agent` (CI build).

            ## Indirme

            | Platform | Asset |
            |---|---|
            | macOS Apple Silicon | `altaris-darwin-arm64` |
            | macOS Intel         | `altaris-darwin-x64`   |
            | Linux x86_64        | `altaris-linux-x64`    |
            | Linux aarch64       | `altaris-linux-arm64`  |
            | Windows x64         | `altaris-windows-x64.exe` |

            Tek-satır kurulum komutları için: Altaris web portal → **CLI Kurulum** (`/setup`).

            Bütünlük: `SHA256SUMS`
