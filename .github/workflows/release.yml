name: Release CLI Binaries

# Asıl source code burada (private). Tag push veya manuel tetik ile derlenen
# binary'ler PUBLIC release repo'sunda asset olarak yayımlanır:
#   https://github.com/argusteknoloji/altaris-super-agent-releases
#
# Neden API + token (SSH değil): bun --compile çıktıları 80-130 MB; GitHub'ın
# git push limiti 100 MB / dosya iken Releases asset upload limiti 2 GB.
# Binary'leri git'e koymak yanlış pattern; doğrudan Release sayfasına atılır.
#
# Gerekli secret (source repo'da):
#   RELEASES_REPO_TOKEN — fine-grained PAT
#     · Repository access: argusteknoloji/altaris-super-agent-releases (sadece o)
#     · Permissions:        Contents = Read & Write
#     · Süre:               1 yıl (rotate edersin)

on:
  push:
    # Yalnız CLI tag'leri tetikler — Desktop için ayrı `-desktop` suffix'li
    # tag'ler desktop-release.yml'i tetikler. Aynı pattern iki workflow'u
    # birden tetiklemesin diye exclude ekledik.
    tags:
      - 'v*'
      - '!v*-desktop'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v0.1.0-beta.2)'
        required: true
        type: string

env:
  RELEASES_REPO: argusteknoloji/altaris-super-agent-releases
  # vscode/ripgrep postinstall GitHub'dan binary indiriyor; anon trafik 403
  # yiyor. Authenticated default GITHUB_TOKEN ile rate limit 5000/saat.
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            artifact: altaris-darwin-arm64
          - target: bun-darwin-x64
            artifact: altaris-darwin-x64
          - target: bun-linux-x64
            artifact: altaris-linux-x64
          - target: bun-linux-arm64
            artifact: altaris-linux-arm64
          - target: bun-windows-x64
            artifact: altaris-windows-x64.exe
    defaults: { run: { working-directory: cli } }
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: Install deps (with retry — postinstall scripts hit GitHub)
        run: |
          for i in 1 2 3; do
            bun install --frozen-lockfile && break || sleep 10
          done

      - name: Bundle main artifact (dist/cli.mjs)
        run: bun run build

      - name: Compile single-file binary
        # bun --compile statically resolves every await import() — opsiyonel
        # cloud-provider SDK'ları (AWS Bedrock, Azure, GCP) ve OTel exporters
        # ile sharp/ripgrep external geçilmeli. Liste cli/scripts/build.ts'teki
        # external[] ile eşleşir; bir gün dinamik üretmeli.
        #
        # GÜVENLIK: --sourcemap KULLANILMIYOR. Public release repo'sunda yalnız
        # minified binary olsun; sourcemap orijinal source path'lerini ve bazı
        # durumlarda gömülü kaynağı sızdırabilir. Source private kalır.
        run: |
          mkdir -p release
          bun build --compile --minify --target=${{ matrix.target }} \
            --external sharp \
            --external @vscode/ripgrep \
            --external @azure/identity \
            ./dist/cli.mjs --outfile release/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: cli/release/${{ matrix.artifact }}
          # Artifact'ler publish job tarafından aynı run içinde indirilip
          # release'a yükleniyor. CI artifact'i sadece job-arası transfer için
          # — uzun retention quota'yı doldurur (1.3GB+ birikti). 1 gün yeter.
          retention-days: 1

  vsix:
    name: Build VS Code extension VSIX
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: vscode-extension } }
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Bump VSIX version (CI — no ALTARIS_NO_VERSION_BUMP gate)
        id: bump
        run: |
          version=$(bun run scripts/bump.ts | tail -n1)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Bumped vscode-extension to $version"
      - name: Bundle (esbuild)
        run: bun esbuild.js
      - name: Package VSIX (versioned + latest pointer)
        run: |
          bun ./node_modules/@vscode/vsce/vsce package --no-dependencies --skip-license -o altaris.vsix
          v="${{ steps.bump.outputs.version }}"
          cp altaris.vsix "altaris-${v}.vsix"
          ls -la altaris*.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: altaris-vsix
          path: |
            vscode-extension/altaris.vsix
            vscode-extension/altaris-*.vsix
          retention-days: 1

  publish:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [build, vsix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }

      - name: Resolve tag name
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Flatten artifacts + compute SHA256SUMS
        # Sıkı whitelist: beş binary + bir VSIX. Sourcemap/.txt/log/profile
        # gibi yan dosyalar ASLA copy edilmesin — public release asset olarak
        # yalnız compiled binary ve VSIX çıksın.
        run: |
          mkdir -p flat
          for name in altaris-darwin-arm64 altaris-darwin-x64 \
                      altaris-linux-x64 altaris-linux-arm64 \
                      altaris-windows-x64.exe; do
            src=$(find dist -type f -name "$name" | head -1)
            if [ -z "$src" ]; then echo "MISSING $name" >&2; exit 1; fi
            cp "$src" "flat/$name"
          done
          # VSIX (vscode-extension build job'ından gelir) — hem latest pointer
          # `altaris.vsix` hem versiyonlu `altaris-X.Y.Z.vsix` flatlanır.
          vsix=$(find dist -type f -name "altaris.vsix" | head -1)
          if [ -z "$vsix" ]; then echo "MISSING altaris.vsix" >&2; exit 1; fi
          cp "$vsix" "flat/altaris.vsix"
          # Versiyonlu VSIX (release asset için kalıcı isim)
          versioned=$(find dist -type f -name "altaris-*.vsix" ! -name "altaris-darwin-*" ! -name "altaris-linux-*" ! -name "altaris-windows-*" | head -1)
          if [ -z "$versioned" ]; then echo "MISSING altaris-<version>.vsix" >&2; exit 1; fi
          cp "$versioned" "flat/$(basename "$versioned")"
          unexpected=$(find flat -type f -not -name 'altaris-*' -not -name 'altaris.vsix' | head)
          if [ -n "$unexpected" ]; then
            echo "REJECT: unexpected file(s) in artifact set: $unexpected" >&2
            exit 1
          fi
          cd flat
          sha256sum altaris-* > SHA256SUMS
          ls -la
          cat SHA256SUMS

      - name: Publish to public release repo
        # Doğrudan Releases API ile asset upload — git push limiti (100 MB)
        # bypass. PAT scope: yalnız `argusteknoloji/altaris-super-agent-
        # releases` üzerinde Contents: Read & Write.
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ steps.tag.outputs.name }}
          name: Altaris CLI ${{ steps.tag.outputs.name }}
          files: |
            flat/altaris-darwin-arm64
            flat/altaris-darwin-x64
            flat/altaris-linux-x64
            flat/altaris-linux-arm64
            flat/altaris-windows-x64.exe
            flat/altaris.vsix
            flat/altaris-*.vsix
            flat/SHA256SUMS
          body: |
            Altaris CLI binary release.
            Source: private `argusteknoloji/altaris-super-agent` (CI build).

            ## Indirme

            | Platform | Asset |
            |---|---|
            | macOS Apple Silicon | `altaris-darwin-arm64` |
            | macOS Intel         | `altaris-darwin-x64`   |
            | Linux x86_64        | `altaris-linux-x64`    |
            | Linux aarch64       | `altaris-linux-arm64`  |
            | Windows x64         | `altaris-windows-x64.exe` |
            | VS Code extension   | `altaris.vsix` |

            Tek-satır kurulum komutları için: Altaris web portal → **CLI Kurulum** (`/setup`).

            VS Code entegrasyonu: `altaris shell-install --with-vscode` (binary kurulduktan sonra) veya manuel `code --install-extension altaris.vsix`.

      # Prod sunucuda CLI binary host'tan API container'a bind mount;
      # release sonrası prod CLI'i de update et + container restart
      # (yeni inode bind mount'a yansın). Otherwise container eski binary'i tutuyor.
      - name: Update prod host CLI + restart api container
        uses: appleboy/ssh-action@v1.2.0
        continue-on-error: true   # release başarılı olsun, prod update best-effort
        with:
          host:     ${{ secrets.PROD_SSH_HOST }}
          port:     ${{ secrets.PROD_SSH_PORT }}
          username: ${{ secrets.PROD_SSH_USER }}
          password: ${{ secrets.PROD_SSH_PASSWORD }}
          script: |
            set -e
            curl -fsSL https://altaris.run/install | sh
            docker restart altaris-api
            sleep 4
            docker exec altaris-api /usr/local/bin/altaris --version || true

            Bütünlük: `SHA256SUMS`
