name: Release CLI Binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            artifact: altaris-darwin-arm64
          - target: bun-darwin-x64
            artifact: altaris-darwin-x64
          - target: bun-linux-x64
            artifact: altaris-linux-x64
          - target: bun-linux-arm64
            artifact: altaris-linux-arm64
          - target: bun-windows-x64
            artifact: altaris-windows-x64.exe
    defaults: { run: { working-directory: cli } }
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Compile single-file binary
        run: |
          mkdir -p release
          bun build --compile --minify --sourcemap --target=${{ matrix.target }} \
            ./dist/cli.mjs --outfile release/${{ matrix.artifact }}
      - name: Smoke run (non-windows)
        if: ${{ !contains(matrix.target, 'windows') && contains(matrix.target, runner.arch == 'X64' && 'x64' || 'arm64') && contains(matrix.target, 'linux') }}
        run: ./release/${{ matrix.artifact }} --version
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: cli/release/${{ matrix.artifact }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
