name: Publish Release

# Bu workflow PUBLIC `argusteknoloji/altaris-super-agent-releases` repo'sunda
# çalışır. Source repo (private) SSH deploy key ile buraya tag push edince
# tetiklenir; bin/<tag>/ altındaki binary'leri release asset olarak ekler.
#
# Cross-repo PAT yok — default GITHUB_TOKEN bu repo'da release oluşturmaya yeter.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)publish'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # release oluştur + asset upload
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Verify artifacts present
        run: |
          test -d "bin/${{ steps.tag.outputs.name }}"
          ls -la "bin/${{ steps.tag.outputs.name }}/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Altaris CLI ${{ steps.tag.outputs.name }}
          files: |
            bin/${{ steps.tag.outputs.name }}/altaris-*
            bin/${{ steps.tag.outputs.name }}/SHA256SUMS
          body: |
            Altaris CLI binary release. Source: private `argusteknoloji/altaris-super-agent`.

            ## Indirme

            | Platform | Asset |
            |---|---|
            | macOS Apple Silicon | `altaris-darwin-arm64` |
            | macOS Intel         | `altaris-darwin-x64` |
            | Linux x86_64        | `altaris-linux-x64` |
            | Linux aarch64       | `altaris-linux-arm64` |
            | Windows x64         | `altaris-windows-x64.exe` |

            Tek-satır kurulum komutları için: web portal → **CLI Kurulum** (`/setup`).

            Bütünlük: `SHA256SUMS`
