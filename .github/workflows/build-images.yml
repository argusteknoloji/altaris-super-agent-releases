name: Build container images

# Web (Next.js) ve API (.NET 9) container image'larını GitHub Actions runner'larında
# (8 GB RAM) derleyip ghcr.io'ya push eder. Production droplet (2 GB) build
# yapmak yerine sadece `docker compose pull && up -d` ile günceller — anlık,
# bellek dostu, atomic.
#
# Tetik: main push veya manual workflow_dispatch.
# Tag pattern:
#   ghcr.io/argusteknoloji/altaris-{web,api}:latest      → her main push
#   ghcr.io/argusteknoloji/altaris-{web,api}:sha-abc123  → her commit (rollback)
#   ghcr.io/argusteknoloji/altaris-{web,api}:vX.Y.Z      → tag push (release)

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'api/**'
      - 'infra/docker-compose.prod.yml'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target'
        required: false
        default: 'all'
        type: choice
        options: [all, web, api]

permissions:
  contents: read
  packages: write   # ghcr.io push için zorunlu

env:
  REGISTRY: ghcr.io
  ORG: argusteknoloji

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            context: ./web
            dockerfile: ./web/Dockerfile
          - service: api
            context: ./api
            dockerfile: ./api/Dockerfile
    steps:
      - uses: actions/checkout@v4

      # workflow_dispatch ile tek hedef seçilirse diğerlerini atla.
      - name: Skip if not in target
        id: gate
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" \
             && "${{ inputs.target }}" != "all" \
             && "${{ inputs.target }}" != "${{ matrix.service }}" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.gate.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: steps.gate.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        if: steps.gate.outputs.skip == 'false'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/altaris-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=tag

      - name: Build + push
        if: steps.gate.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          # linux/amd64 yeterli — DigitalOcean droplet x86_64.
          platforms: linux/amd64
          # next.config.ts GITHUB_RUN_NUMBER + GITHUB_SHA env'lerini okuyup
          # NEXT_PUBLIC_BUILD_VERSION'a "{pkgVersion}+build.{N}" formatında
          # yansıtır. .dockerignore .git'i hariç tuttuğu için container içinde
          # git komutu çalışmaz; bu nedenle CI değerlerini build-arg olarak
          # geçiriyoruz. API Dockerfile'ı bu ARG'ları görmez, harmless.
          build-args: |
            GITHUB_RUN_NUMBER=${{ github.run_number }}
            GITHUB_SHA=${{ github.sha }}

      - name: Summary
        if: steps.gate.outputs.skip == 'false'
        run: |
          echo "## ${{ matrix.service }} image pushed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # Build başarılı + main push ise prod sunucuya SSH ile pull + restart.
  # Manuel workflow_dispatch'te de çalışır (acil deploy için).
  deploy:
    name: Deploy to prod
    needs: build
    if: github.ref == 'refs/heads/main'   # hem push hem workflow_dispatch için deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Compose + Caddyfile drift'i önle — repodaki dosyaları prod'a kopyala.
      # Compose değişikliği bind mount eklemişti ama sunucu eski kalmıştı; vault
      # tree 404 verdi. Caddyfile değişikliği de aynı şekilde sync olmalı.
      - name: Sync compose + caddyfile to prod
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.PROD_SSH_HOST }}
          port:     ${{ secrets.PROD_SSH_PORT }}
          username: ${{ secrets.PROD_SSH_USER }}
          password: ${{ secrets.PROD_SSH_PASSWORD }}
          source:   "infra/docker-compose.prod.yml,infra/caddy/Caddyfile"
          target:   "/opt/altaris/"
          strip_components: 0
          overwrite: true

      - name: SSH pull + atomic restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.PROD_SSH_HOST }}
          port:     ${{ secrets.PROD_SSH_PORT }}
          username: ${{ secrets.PROD_SSH_USER }}
          password: ${{ secrets.PROD_SSH_PASSWORD }}
          script_stop: true
          script: |
            set -e
            cd /opt/altaris/infra
            echo "→ ghcr.io'dan latest image'ları çekiyor…"
            docker compose -f docker-compose.prod.yml --env-file .env.production pull web api
            echo "→ Container'ları yeni image ile restart (compose değişikliği varsa recreate)…"
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d web api
            echo "→ Caddyfile reload (zero-downtime config refresh)…"
            docker exec altaris-caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile 2>&1 || true
            sleep 4
            echo "→ Health:"
            docker compose -f docker-compose.prod.yml --env-file .env.production ps web api
            echo ""
            # ─── Post-deploy temizlik (her successful deploy sonrası) ──────
            # Her ":latest" tag'i geçişinde önceki image dangling kalıyor.
            # 159 dangling birikip 24GB diski doldurmuştu → /api/proxy/me 500.
            # Çözüm: deploy bitince 24 saatten eski unused image'ları sil.
            # `until=24h` rollback penceresini korur (son ~10 deploy elde kalır,
            # eskiler temizlenir). Build cache de kontrolden çıkmasın diye
            # haftalık limit. Çalışan container'a bağlı image'lara dokunmaz.
            echo "→ Post-deploy temizlik (24h+ unused image'lar)…"
            docker image prune -af --filter "until=24h" 2>&1 | tail -3 || true
            docker container prune -f --filter "until=24h" 2>&1 | tail -2 || true
            docker builder prune -af --filter "until=168h" 2>&1 | tail -2 || true
            echo "→ Disk:"
            df -h / | tail -1

      - name: Smoke test
        run: |
          for url in https://altarisplatform.com https://api.altarisplatform.com/health/live; do
            code=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 10 "$url")
            echo "  HTTP $code  →  $url"
            if [[ "$code" != "200" ]]; then exit 1; fi
          done
