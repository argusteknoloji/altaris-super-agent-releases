name: Release Desktop App

# Tauri 2 desktop app build matrix → public release repo asset upload.
# CLI release.yml ile aynı pattern: source private, artifact public.
#
# Tetik: tag push (v*-desktop) veya manuel workflow_dispatch.
# Tag konvansiyonu: v0.1.0-beta.6-desktop (CLI tag'leriyle çakışmasın).
#
# Asset'ler:
#   altaris-desktop-darwin-arm64.dmg     macOS Apple Silicon
#   altaris-desktop-darwin-x64.dmg       macOS Intel
#   altaris-desktop-linux-x64.AppImage   Linux x86_64
#   altaris-desktop-linux-x64.deb        Linux Debian/Ubuntu paket
#   altaris-desktop-windows-x64.msi      Windows installer
#   altaris-desktop-windows-x64.exe      Windows portable (bundled)
#   latest.json                          Tauri updater manifest
#   SHA256SUMS                           Bütünlük doğrulama

on:
  push:
    tags: ["v*-desktop"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0-beta.6-desktop)'
        required: true
        type: string

env:
  RELEASES_REPO: argusteknoloji/altaris-super-agent-releases
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Tek macOS runner'da universal binary üretiyoruz — hem Apple
          # Silicon hem Intel Mac'lerde çalışır. macos-13 (Intel) runner'lar
          # GitHub Actions free tier'da çok kıt (50dk+ kuyruk), buna gerek yok.
          # Universal target için macos-14 önce x86_64 toolchain'i de ekler.
          - os: macos-14
            label: macos-universal
            target: universal-apple-darwin
          - os: ubuntu-22.04
            label: linux-x64
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            label: windows-x64
            target: x86_64-pc-windows-msvc
            # NSIS-only bundle (WiX MSI runner'da yok, EV cert de yok — Sprint #67)
    defaults: { run: { working-directory: desktop } }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # Universal Apple binary için hem aarch64 hem x86_64 target lazım.
        # Diğer target'larda matrix.target tek satır.
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}

      - name: Install Linux deps (webkit2gtk + libsoup3)
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install Bun (frontend bundler)
        uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with: { version: 9 }

      - name: Setup Node (pnpm + tauri-cli için)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Tauri build
        # Windows: bundle nsis-only (WiX MSI Authenticode imzası olmadan
        # kullanışsız, NSIS daha basit installer yeterli).
        run: |
          if [[ "${{ matrix.label }}" == "windows-x64" ]]; then
            pnpm tauri build --target ${{ matrix.target }} --bundles nsis
          else
            pnpm tauri build --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Stage artifacts
        # find ile yalnız regular file'ları topla — Tauri bazı bundler'lar
        # ara dizin (örn. linux/appimage/Altaris.AppDir/) bırakıyor, glob
        # bunu da match ediyor + cp non-recursive fail ediyordu.
        # Ek olarak macOS default bash 3.2'de `shopt globstar` yok (set -e ile
        # ilk satırda exit). find çapraz-OS güvenli.
        shell: bash
        run: |
          mkdir -p staging
          BASE="src-tauri/target/${{ matrix.target }}/release/bundle"
          # Tüm bilinen Tauri bundle çıktılarını tek find ile yakala.
          # İsimleri sadeleştir: altaris-desktop-<label>.<ext> — versiyon
          # numarasını dosya adında tutmuyoruz (release tag zaten var).
          find "$BASE" -maxdepth 3 -type f \( \
              -name '*.dmg'      -o \
              -name '*.AppImage' -o \
              -name '*.deb'      -o \
              -name '*.msi'      -o \
              -name '*-setup.exe' \
            \) | while read -r f; do
              base="$(basename "$f")"
              # Extension koru, prefix'i normalize et
              case "$base" in
                *.dmg)        ext="dmg" ;;
                *.AppImage)   ext="AppImage" ;;
                *.deb)        ext="deb" ;;
                *.msi)        ext="msi" ;;
                *-setup.exe)  ext="setup.exe" ;;
                *)            ext="${base##*.}" ;;
              esac
              cp "$f" "staging/altaris-desktop-${{ matrix.label }}.${ext}"
            done
          echo "=== staging/ ==="
          ls -la staging/
          # Hiçbir artifact toplanmadıysa (ki olmamalı), explicit fail.
          test -n "$(ls -A staging/)" || { echo "::error::No artifacts produced"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: desktop/staging/*

  publish:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Flatten + SHA256SUMS + manifest
        run: |
          mkdir flat
          find dist -type f -not -name 'latest.json' -exec cp -n {} flat/ \;
          cd flat
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Generate Tauri updater manifest (latest.json)
        run: |
          set -e
          cd flat
          TAG="${{ steps.tag.outputs.name }}"
          # Strip the -desktop suffix so the version field matches Tauri's expectation
          VERSION="${TAG%-desktop}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BASE="https://github.com/${{ env.RELEASES_REPO }}/releases/download/${TAG}"

          # Tauri 2 updater manifest schema
          # Universal macOS dmg hem aarch64 hem x86_64 platform key'leri için
          # aynı asset URL'i — Tauri updater tek dmg ile her iki mimari için
          # download başlatır.
          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Altaris Desktop ${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": { "signature": "", "url": "${BASE}/altaris-desktop-macos-universal.dmg" },
              "darwin-x86_64":  { "signature": "", "url": "${BASE}/altaris-desktop-macos-universal.dmg" },
              "linux-x86_64":   { "signature": "", "url": "${BASE}/altaris-desktop-linux-x64.AppImage" },
              "windows-x86_64": { "signature": "", "url": "${BASE}/altaris-desktop-windows-x64-setup.exe" }
            }
          }
          EOF
          ls -la

      - name: Publish Desktop release
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ steps.tag.outputs.name }}
          name: Altaris Desktop ${{ steps.tag.outputs.name }}
          files: |
            flat/*
          body: |
            Altaris Desktop App release.

            ## Indirme

            | Platform | Asset |
            |---|---|
            | macOS Apple Silicon | `altaris-desktop-macos-arm64-*.dmg` |
            | macOS Intel         | `altaris-desktop-macos-x64-*.dmg`   |
            | Linux x86_64        | `altaris-desktop-linux-x64-*.AppImage` veya `.deb` |
            | Windows x64         | `altaris-desktop-windows-x64-*.msi` |

            **Auto-update:** Desktop App `latest.json` manifest'ini takip eder; yeni release'de otomatik bildirim.

            **Bütünlük:** `SHA256SUMS`
