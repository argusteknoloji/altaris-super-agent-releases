name: Release Desktop App

# Tauri 2 desktop app build matrix → public release repo asset upload.
# CLI release.yml ile aynı pattern: source private, artifact public.
#
# Tetik: tag push (v*-desktop) veya manuel workflow_dispatch.
# Tag konvansiyonu: v0.1.0-beta.6-desktop (CLI tag'leriyle çakışmasın).
#
# Asset'ler:
#   altaris-desktop-darwin-arm64.dmg     macOS Apple Silicon
#   altaris-desktop-darwin-x64.dmg       macOS Intel
#   altaris-desktop-linux-x64.AppImage   Linux x86_64
#   altaris-desktop-linux-x64.deb        Linux Debian/Ubuntu paket
#   altaris-desktop-windows-x64.msi      Windows installer
#   altaris-desktop-windows-x64.exe      Windows portable (bundled)
#   latest.json                          Tauri updater manifest
#   SHA256SUMS                           Bütünlük doğrulama

on:
  push:
    tags: ["v*-desktop"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0-beta.6-desktop)'
        required: true
        type: string

env:
  RELEASES_REPO: argusteknoloji/altaris-super-agent-releases
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Tek macOS runner'da universal binary üretiyoruz — hem Apple
          # Silicon hem Intel Mac'lerde çalışır. macos-13 (Intel) runner'lar
          # GitHub Actions free tier'da çok kıt (50dk+ kuyruk), buna gerek yok.
          # Universal target için macos-14 önce x86_64 toolchain'i de ekler.
          - os: macos-14
            label: macos-universal
            target: universal-apple-darwin
          - os: ubuntu-22.04
            label: linux-x64
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            label: windows-x64
            target: x86_64-pc-windows-msvc
            # NSIS-only bundle (WiX MSI runner'da yok, EV cert de yok — Sprint #67)
    defaults: { run: { working-directory: desktop } }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # Universal Apple binary için hem aarch64 hem x86_64 target lazım.
        # Diğer target'larda matrix.target tek satır.
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}

      - name: Install Linux deps (webkit2gtk + libsoup3)
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install Bun (frontend bundler)
        uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with: { version: 9 }

      - name: Setup Node (pnpm + tauri-cli için)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # ═══════════════ macOS code-signing setup ═══════════════
      # Apple Developer ID Application sertifikasını runner Keychain'ine kur.
      # Secret yoksa ad-hoc sign'a düşer ('-' identity), kullanıcı Right-Click
      # → Open ile açmak zorunda kalır.
      - name: Import macOS code-signing certificate
        if: contains(matrix.label, 'macos') && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          # Geçici keychain — runner cleanup'ında otomatik silinir
          KEYCHAIN_PATH="$RUNNER_TEMP/altaris-build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Sertifikayı kur
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Identity'yi env'e koy (Tauri config'i bunu okur)
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "Code-signing identity: $IDENTITY"

      # ═══════════════ Windows Authenticode certificate setup ═══════════════
      # Tauri-action SignTool için cert dosyası ve şifresi ister; Tauri
      # config'i bizim için signtool çağırır (windows.signCommand bypass'i yok,
      # tauri-cli envs üstünden alır).
      - name: Import Windows code-signing certificate
        if: matrix.label == 'windows-x64' && env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        shell: pwsh
        run: |
          $cert = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath = "$env:RUNNER_TEMP\\altaris-codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, $cert)
          echo "WINDOWS_CERT_PATH=$certPath" >> $env:GITHUB_ENV

      - name: Tauri build
        env:
          # macOS notarization — env vars Tauri 2 bundler tarafından okunur,
          # build sonrası dmg + app.tar.gz otomatik notarize + staple.
          APPLE_SIGNING_IDENTITY:    ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                  ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:            ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID:             ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater — kullanıcı yeni sürüm geldiğinde imzayı doğrular.
          # Public key tauri.conf.json'da (pubkey:""), private key burada.
          TAURI_SIGNING_PRIVATE_KEY:           ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD:  ${{ secrets.TAURI_UPDATER_KEY_PASSWORD }}
          TAURI_BUNDLER_WIX_FIPS_COMPLIANT: "true"
        run: |
          if [[ "${{ matrix.label }}" == "windows-x64" ]]; then
            pnpm tauri build --target ${{ matrix.target }} --bundles nsis
          else
            pnpm tauri build --target ${{ matrix.target }}
          fi
        shell: bash

      # ═══════════════ Windows post-build signtool ═══════════════
      # NSIS installer'ı imzala. signtool Windows runner'da default kurulu.
      - name: Sign Windows NSIS installer
        if: matrix.label == 'windows-x64' && env.WINDOWS_CERT_PATH != ''
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe" | Select-Object -First 1
          if ($exe) {
            & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\signtool.exe" sign `
              /f "$env:WINDOWS_CERT_PATH" `
              /p "$env:WINDOWS_CERTIFICATE_PASSWORD" `
              /tr http://timestamp.digicert.com `
              /td sha256 `
              /fd sha256 `
              /d "Altaris Desktop" `
              /du "https://argusteknoloji.com" `
              "$($exe.FullName)"
            Write-Host "Signed: $($exe.FullName)"
          }

      # ═══════════════ Linux GPG sign (AppImage + .deb) ═══════════════
      # AppImage / .deb için GPG signature .sig dosyaları üretilir, kullanıcı
      # public key ile doğrulayabilir. Apt repository için zorunlu.
      - name: Linux GPG sign
        if: matrix.label == 'linux-x64' && env.LINUX_GPG_PRIVATE_KEY != ''
        env:
          LINUX_GPG_PRIVATE_KEY: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
          LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
          LINUX_GPG_KEY_ID:     ${{ secrets.LINUX_GPG_KEY_ID }}
        run: |
          echo "$LINUX_GPG_PRIVATE_KEY" | gpg --batch --import
          BASE="src-tauri/target/${{ matrix.target }}/release/bundle"
          for f in $(find "$BASE" -type f \( -name '*.AppImage' -o -name '*.deb' \)); do
            echo "$LINUX_GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
              --passphrase-fd 0 --default-key "$LINUX_GPG_KEY_ID" \
              --detach-sign --armor "$f"
            echo "Signed: $f → $f.asc"
          done

      - name: Stage artifacts
        # find ile yalnız regular file'ları topla — Tauri bazı bundler'lar
        # ara dizin (örn. linux/appimage/Altaris.AppDir/) bırakıyor, glob
        # bunu da match ediyor + cp non-recursive fail ediyordu.
        # Ek olarak macOS default bash 3.2'de `shopt globstar` yok (set -e ile
        # ilk satırda exit). find çapraz-OS güvenli.
        shell: bash
        run: |
          mkdir -p staging
          BASE="src-tauri/target/${{ matrix.target }}/release/bundle"
          # Tüm bilinen Tauri bundle çıktılarını + signature/sidecar dosyalarını
          # tek find ile yakala. .asc (GPG sig), .sig (Tauri updater sig).
          find "$BASE" -maxdepth 3 -type f \( \
              -name '*.dmg'        -o \
              -name '*.AppImage'   -o \
              -name '*.deb'        -o \
              -name '*.msi'        -o \
              -name '*-setup.exe'  -o \
              -name '*.asc'        -o \
              -name '*.sig' \
            \) | while read -r f; do
              base="$(basename "$f")"
              case "$base" in
                *.dmg)            ext="dmg" ;;
                *.AppImage)       ext="AppImage" ;;
                *.AppImage.asc)   ext="AppImage.asc" ;;
                *.deb)            ext="deb" ;;
                *.deb.asc)        ext="deb.asc" ;;
                *.msi)            ext="msi" ;;
                *-setup.exe)      ext="setup.exe" ;;
                *-setup.exe.sig)  ext="setup.exe.sig" ;;
                *.dmg.sig)        ext="dmg.sig" ;;
                *.AppImage.sig)   ext="AppImage.sig" ;;
                *)                ext="${base##*.}" ;;
              esac
              cp "$f" "staging/altaris-desktop-${{ matrix.label }}.${ext}"
            done
          echo "=== staging/ ==="
          ls -la staging/
          # Hiçbir artifact toplanmadıysa (ki olmamalı), explicit fail.
          test -n "$(ls -A staging/)" || { echo "::error::No artifacts produced"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: desktop/staging/*
          retention-days: 1

  publish:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Flatten + SHA256SUMS + manifest
        run: |
          mkdir flat
          find dist -type f -not -name 'latest.json' -exec cp -n {} flat/ \;
          cd flat
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Generate Tauri updater manifest (latest.json)
        run: |
          set -e
          cd flat
          TAG="${{ steps.tag.outputs.name }}"
          # Strip the -desktop suffix so the version field matches Tauri's expectation
          VERSION="${TAG%-desktop}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BASE="https://github.com/${{ env.RELEASES_REPO }}/releases/download/${TAG}"

          # Tauri updater signature dosyaları (.sig) varsa içeriklerini gömeriz;
          # yoksa "" — updater yine indirir ama imza doğrulamaz (dev mode).
          read_sig() {
            local f="$1"
            if [[ -f "$f" ]]; then cat "$f" | tr -d '\n'; else echo ""; fi
          }
          MAC_SIG=$(read_sig altaris-desktop-macos-universal.dmg.sig)
          LIN_SIG=$(read_sig altaris-desktop-linux-x64.AppImage.sig)
          WIN_SIG=$(read_sig altaris-desktop-windows-x64.setup.exe.sig)

          # Tauri 2 updater manifest schema
          # Universal macOS dmg hem aarch64 hem x86_64 platform key'leri için
          # aynı asset URL'i — Tauri updater tek dmg ile her iki mimari için
          # download başlatır.
          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Altaris Desktop ${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": { "signature": "${MAC_SIG}", "url": "${BASE}/altaris-desktop-macos-universal.dmg" },
              "darwin-x86_64":  { "signature": "${MAC_SIG}", "url": "${BASE}/altaris-desktop-macos-universal.dmg" },
              "linux-x86_64":   { "signature": "${LIN_SIG}", "url": "${BASE}/altaris-desktop-linux-x64.AppImage" },
              "windows-x86_64": { "signature": "${WIN_SIG}", "url": "${BASE}/altaris-desktop-windows-x64-setup.exe" }
            }
          }
          EOF
          ls -la

      - name: Publish Desktop release
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ steps.tag.outputs.name }}
          name: Altaris Desktop ${{ steps.tag.outputs.name }}
          files: |
            flat/*
          body: |
            Altaris Desktop App release.

            ## Indirme

            | Platform | Asset |
            |---|---|
            | macOS Apple Silicon | `altaris-desktop-macos-arm64-*.dmg` |
            | macOS Intel         | `altaris-desktop-macos-x64-*.dmg`   |
            | Linux x86_64        | `altaris-desktop-linux-x64-*.AppImage` veya `.deb` |
            | Windows x64         | `altaris-desktop-windows-x64-*.msi` |

            **Auto-update:** Desktop App `latest.json` manifest'ini takip eder; yeni release'de otomatik bildirim.

            **Bütünlük:** `SHA256SUMS`
